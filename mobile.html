<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="An interactive economic model of frontier-AI-lab competition — a phone introduction to the question and the basic model.">
<title>Will frontier AI labs be profitable?</title>
<style>
  /* ============================================================ tokens / theme
     One direction &#8212; "Instrument" &#8212; that follows the environment's light/dark.
     Tokens live on :root; the media query and the data-theme overrides swap them. */
  :root {
    --bg:#f4f7fa; --surface:#ffffff; --surface-2:#eef2f6;
    --ink:#111925; --muted:#54606f; --faint:#aeb8c4; --line:rgba(17,25,37,.13);
    --accent:#2f6bdb; --follower:#c2621a;
    --stage: radial-gradient(120% 90% at 50% -8%, #ffffff, #d9e1ea 78%);
    --bezel-a:#e7ebf0; --bezel-b:#c9d2dc; --frame: rgba(40,54,74,.4);
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color-scheme: light;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#0d1117; --surface:#161b22; --surface-2:#1c232d;
      --ink:#e6edf3; --muted:#8b98a6; --faint:#46505e; --line:rgba(139,152,166,.16);
      --accent:#4c8dff; --follower:#f0883e;
      --stage: radial-gradient(120% 90% at 50% -8%, #1b2431, #0a0d12 72%);
      --bezel-a:#232c38; --bezel-b:#05070a; --frame: rgba(0,0,0,.8);
      color-scheme: dark;
    }
  }
  :root[data-theme="light"] {
    --bg:#f4f7fa; --surface:#ffffff; --surface-2:#eef2f6;
    --ink:#111925; --muted:#54606f; --faint:#aeb8c4; --line:rgba(17,25,37,.13);
    --accent:#2f6bdb; --follower:#c2621a;
    --stage: radial-gradient(120% 90% at 50% -8%, #ffffff, #d9e1ea 78%);
    --bezel-a:#e7ebf0; --bezel-b:#c9d2dc; --frame: rgba(40,54,74,.4);
    color-scheme: light;
  }
  :root[data-theme="dark"] {
    --bg:#0d1117; --surface:#161b22; --surface-2:#1c232d;
    --ink:#e6edf3; --muted:#8b98a6; --faint:#46505e; --line:rgba(139,152,166,.16);
    --accent:#4c8dff; --follower:#f0883e;
    --stage: radial-gradient(120% 90% at 50% -8%, #1b2431, #0a0d12 72%);
    --bezel-a:#232c38; --bezel-b:#05070a; --frame: rgba(0,0,0,.8);
    color-scheme: dark;
  }

  /* ============================================================= base / reset */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font: 16px/1.5 var(--sans); color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow: hidden;
  }
  button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }

  .stage {
    height: 100%; display: grid; grid-template-rows: auto 1fr; gap: 14px;
    padding: 14px; place-items: center; background: var(--stage);
  }

  /* -------- prototype-only top chrome: a label + a light/dark preview toggle -- */
  .chrome {
    display: flex; align-items: center; gap: 12px; font-size: 12.5px; color: var(--muted);
  }
  .chrome .lbl { letter-spacing: .16em; text-transform: uppercase; font-size: 10.5px; color: var(--faint); font-family: var(--mono); }
  .chrome .hint { font-size: 11px; color: var(--faint); }
  .tt {
    display: inline-flex; align-items: center; gap: 7px; padding: 6px 13px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--line); color: var(--ink);
    font-size: 12px; font-weight: 600;
  }
  .tt svg { width: 15px; height: 15px; }

  /* ------------------------------------------------------------- the phone -- */
  .phone {
    position: relative; width: 392px; height: min(818px, calc(100vh - 88px));
    border-radius: 44px; overflow: hidden; background: var(--bg);
    box-shadow: 0 0 0 10px var(--bezel-b), 0 0 0 12px var(--bezel-a), 0 30px 70px -20px var(--frame);
  }
  .track {
    display: flex; height: 100%; width: 100%;
    overflow-x: auto; overflow-y: hidden;
    scroll-snap-type: x mandatory;   /* smooth programmatic scroll fights mandatory snap
       (it reverts to 0), so button/dot nav jumps instantly + the content fade carries the
       transition; native touch swipe animates on its own. */
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .track::-webkit-scrollbar { display: none; }

  .slide {
    flex: 0 0 100%; scroll-snap-align: start; scroll-snap-stop: always;
    height: 100%; overflow-y: auto; scrollbar-width: none;
    display: flex; flex-direction: column;
    padding: clamp(34px, 8vh, 68px) 26px calc(94px + env(safe-area-inset-bottom, 0px));
  }
  .slide::-webkit-scrollbar { display: none; }
  .slide-top { flex: 0 0 auto; margin-bottom: 26px; }
  .slide-body {
    flex: 1 1 auto; display: flex; flex-direction: column;
    justify-content: safe center;   /* 'safe' &#8594; never clip the top when content overflows */
    gap: 20px; min-height: 0;
  }
  .slide[data-kind="cover"] .slide-body,
  .slide[data-kind="outro"] .slide-body { justify-content: safe flex-end; }

  /* content-entry motion, keyed off the active slide */
  .slide > *, .slide-body > * { opacity: 0; transform: translateY(9px); }
  .slide.is-active > *, .slide.is-active .slide-body > * {
    opacity: 1; transform: none;
    transition: opacity .5s ease, transform .55s cubic-bezier(.2,.7,.2,1);
  }
  .slide.is-active .slide-body > *:nth-child(2) { transition-delay: .05s; }
  .slide.is-active .slide-body > *:nth-child(3) { transition-delay: .10s; }
  .slide.is-active .slide-body > *:nth-child(n+4) { transition-delay: .15s; }

  /* ---- content atoms ---- */
  .eyebrow {
    font-family: var(--mono); font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--follower); display: flex; align-items: center; gap: 10px;
  }
  .eyebrow::after {
    content: ""; flex: 1 1 auto; height: 1px;
    background: repeating-linear-gradient(90deg, var(--line) 0 6px, transparent 6px 12px);
  }
  .title {
    margin: 0; font-weight: 700; letter-spacing: -.015em; line-height: 1.12; text-wrap: balance;
    font-size: clamp(25px, 6.6vw, 32px); color: var(--ink);
  }
  .slide[data-kind="cover"] .title { font-size: clamp(33px, 9.2vw, 42px); line-height: 1.04; }
  .gloss { margin: 0; color: var(--muted); font-size: 15.5px; line-height: 1.6; }
  .gloss b, .list b { color: var(--ink); font-weight: 650; }

  /* the equation &#8212; a roomy, prominent readout */
  .eq {
    font-family: var(--mono); font-size: clamp(19px, 5.3vw, 23px); color: var(--ink);
    background: var(--surface); border: 1px solid var(--line); border-left: 3px solid var(--accent);
    border-radius: 10px; padding: 24px 20px; min-height: 92px;
    display: flex; flex-direction: column; justify-content: center; gap: .2em;
    overflow-x: auto; scrollbar-width: none; line-height: 1.5;
  }
  .eq::-webkit-scrollbar { display: none; }
  .eq .line { white-space: nowrap; }
  .eq .big { white-space: nowrap; font-size: 1.16em; color: var(--follower); margin-top: .35em; letter-spacing: .01em; }
  .eq i { font-style: italic; }
  .eq sup, .eq sub { font-size: .66em; font-style: normal; }
  .eq sup sup, .eq sup sub { font-size: .82em; }
  .eq .mo { padding: 0 .32em; opacity: .78; }
  .eq .mo.dot { padding: 0 .18em; opacity: .55; }
  .eq .amp { padding: 0 .5em; opacity: .45; font-style: italic; font-size: .8em; }

  /* calibration ledger &#8212; shown only for well-graded parameters (A / B) */
  .params { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column;
    border-top: 1px solid var(--line); }
  .params li { display: flex; flex-direction: column; gap: 4px; padding: 13px 0; border-bottom: 1px solid var(--line); }
  .params .row1 { display: flex; align-items: baseline; gap: 12px; }
  .params .sym { font-family: var(--mono); font-size: 14px; color: var(--muted); flex: 0 0 auto; }
  .params .val { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--accent); }
  .params .note { color: var(--muted); font-size: 13px; line-height: 1.45; }

  .list { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 17px; }
  .list li { display: grid; grid-template-columns: auto 1fr; gap: 13px; align-items: start; }
  .list .k { font-family: var(--mono); font-size: 12.5px; letter-spacing: .04em; color: var(--accent);
    padding-top: 3px; text-transform: uppercase; }
  .list span:last-child { color: var(--muted); font-size: 15px; line-height: 1.5; }

  .foot { margin: 0; font-size: 13.5px; color: var(--muted); }
  .foot a { color: var(--accent); text-decoration: none; border-bottom: 1px solid currentColor; }
  .credit { margin: 4px 0 0; font-family: var(--mono); font-size: 11px; line-height: 1.6; color: var(--faint);
    letter-spacing: .02em; }

  .swipehint { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted);
    font-family: var(--mono); letter-spacing: .04em; }
  .swipehint .ar { animation: nudge 1.6s ease-in-out infinite; font-style: normal; }
  @keyframes nudge { 0%,100% { transform: translateX(0); } 50% { transform: translateX(5px); } }

  /* ------------------------------------------------------ bottom navigator -- */
  .nav {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 5;
    padding: 12px 20px calc(14px + env(safe-area-inset-bottom, 0px));
    display: flex; align-items: center; gap: 12px;
    background: linear-gradient(to top, var(--bg) 42%, transparent);
  }
  .progress { position: absolute; left: 0; top: 0; height: 2px; width: 100%; background: var(--line); }
  .progress > i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .3s ease; }
  .dots { display: flex; gap: 7px; flex: 1 1 auto; align-items: center; }
  .dots button { width: 7px; height: 7px; border-radius: 999px; background: var(--faint); padding: 0;
    transition: transform .2s, background .2s; flex: 0 0 auto; }
  .dots button[aria-current="true"] { background: var(--accent); transform: scale(1.5); }
  .count { font-family: var(--mono); font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums;
    letter-spacing: .04em; min-width: 46px; text-align: right; }
  .arrow { width: 34px; height: 34px; border-radius: 999px; display: grid; place-items: center;
    background: var(--surface); border: 1px solid var(--line); color: var(--ink); font-size: 18px; }
  .arrow[disabled] { opacity: .3; cursor: default; }

  /* ---------------------------------------------------------- responsive -- */
  @media (max-width: 460px), (max-height: 720px) {
    .stage { padding: 0; gap: 0; grid-template-rows: 1fr; background: var(--bg); }
    .chrome {
      position: fixed; top: calc(8px + env(safe-area-inset-top, 0px)); left: 50%; transform: translateX(-50%);
      z-index: 40; background: color-mix(in srgb, var(--bg) 74%, transparent);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 5px 7px; border-radius: 999px; border: 1px solid var(--line);
    }
    .chrome .lbl, .chrome .hint { display: none; }
    .phone { width: 100vw; height: 100dvh; border-radius: 0; box-shadow: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .track { scroll-behavior: auto; }
    .slide > *, .slide-body > * { opacity: 1 !important; transform: none !important; transition: none !important; }
    .swipehint .ar { animation: none; }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="chrome">
    <button class="tt" id="tt" aria-label="Toggle light or dark"><span id="ttico"></span><span id="ttlab">Theme</span></button>
  </div>

  <div class="phone">
    <div class="track" id="track" tabindex="0" aria-label="Introduction slides"></div>
    <div class="nav">
      <div class="progress"><i id="bar"></i></div>
      <button class="arrow" id="prev" aria-label="Previous slide">&#8249;</button>
      <div class="dots" id="dots" role="tablist" aria-label="Slides"></div>
      <button class="arrow" id="next" aria-label="Next slide">&#8250;</button>
      <span class="count" id="count"></span>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---- hand-set math (CSP-safe; will move to KaTeX/MathML for the final build) ----
  var V = function (s) { return "<i>" + s + "</i>"; };
  var S = function (s) { return "<sup>" + s + "</sup>"; };
  var b = function (s) { return "<sub>" + s + "</sub>"; };
  var o = function (s) { return '<span class="mo">' + s + "</span>"; };
  var dot = '<span class="mo dot">&middot;</span>';
  var xL = V("x") + S("L"), xF = V("x") + S("F");
  var line = function (s) { return '<span class="line">' + s + "</span>"; };

  // ---- content model ----
  var SLIDES = [
    { kind: "cover",
      eyebrow: "An interactive model",
      title: "Will frontier<br>AI labs be<br>profitable?",
      gloss: "A race between a <b>leader</b> &#8212; the top labs, charging a premium for being ahead &#8212; and a <b>follower</b>: open-weight models sold at cost. When is the lead worth more than the bill for keeping it?",
      hint: true },

    { kind: "notice",
      eyebrow: "A note on your phone",
      title: "The explorer needs a bigger screen",
      gloss: "The full widget &#8212; sliders, live graphs, layered models &#8212; is built for a laptop. On a phone, here is a short guided introduction to the ideas and the numbers behind it.",
      foot: "Open on a laptop for the interactive explorer." },

    { kind: "features",
      eyebrow: "What the explorer does",
      title: "Build the model up, one mechanism at a time",
      list: [
        ["Levels", "Start from the bare model and <b>add one mechanism per level</b> &mdash; training-in-advance, AI-accelerated R&amp;D, the compute slowdown, value saturation&hellip;"],
        ["Calibrate", "Move <b>observables you can argue about</b> &mdash; compute scaling, follower lag, margins &mdash; and watch the implied parameters update live."],
        ["See", "<b>Profit</b> over time, <b>revenue vs cost</b>, and the <b>capability gap</b> between leader and follower."]
      ] },

    { kind: "thesis",
      eyebrow: "The basic model",
      title: "A lead worth paying for",
      gloss: "The leader pushes the capability frontier; the follower trails a few months behind and gives the same thing away at cost. The leader earns a premium for that gap &mdash; and pays more every year to keep extending it. Whether it profits is a race between those two forces, and the next slides build that race from the ground up.",
      foot: "Capability is measured in orders of magnitude (OOM) above today's frontier &mdash; today is zero." },

    { kind: "eq", eyebrow: "01 &middot; The race",
      title: "Capability climbs at a steady pace",
      eq: [ line(V("c&#775;") + S("L") + o("=") + V("g") + b("c") + '<span class="amp">and</span>' + V("a&#775;") + S("L") + o("=") + V("g") + b("a")) ],
      gloss: "The leader's capability rises at a fixed pace each year &mdash; part more compute, part better algorithms. Together the frontier advances &asymp; <b>1.07 OOM/yr</b>, roughly a 12&times; yearly gain in effective compute.",
      params: [
        [V("g") + b("c"), "0.623 OOM/yr", "compute &times;4.2 / yr &mdash; Epoch, several series agree"],
        [V("g") + b("a"), "0.447 OOM/yr", "algorithmic efficiency &times;2.8 / yr, two anchors"]
      ] },

    { kind: "eq", eyebrow: "02 &middot; The gap",
      title: "The follower catches up",
      eq: [ line(V("x&#775;") + S("F") + o("=") + V("&delta;") + "(" + xL + o("&minus;") + xF + ")" + o("=") + V("&delta;") + V("&Delta;")) ],
      gloss: "The follower has <b>no engine of its own</b> &mdash; pure catch-up. It closes the gap &Delta; at rate &delta;; the further behind, the faster it gains. Calibrated so the gap holds <b>steady</b> at &Delta;&#8320;.",
      params: [
        [V("&Delta;") + b("0"), "0.70 OOM", "&asymp; 8-month lag behind the frontier (METR, private benches)"],
        [V("&delta;"), "&asymp; 1.53 / yr", "set by the lag, so the gap stays constant"]
      ] },

    { kind: "eq", eyebrow: "03 &middot; Value",
      title: "What capability is worth",
      eq: [ line(V("W") + "(" + V("x") + ")" + o("=") + V("W") + b("0") + dot + "10" + S(V("&nu;") + V("x"))) ],
      gloss: "A model's dollar value climbs with capability &mdash; <b>each order of magnitude is worth several times the last</b>, so here value compounds without limit (a saturating bend arrives only in a later model). How steep that climb is (&nu;) isn't tightly pinned down &mdash; it's one of the dials you set in the explorer." },

    { kind: "eq", eyebrow: "04 &middot; Revenue",
      title: "Revenue is the rent on the lead",
      eq: [ line("revenue" + o("=") + V("&theta;") + dot + "[ " + V("W") + "(" + xL + ")" + o("&minus;") + V("W") + "(" + xF + ") ]") ],
      gloss: "The leader can only charge for the <b>value gap</b> over the free follower &mdash; the rent it collects for being ahead. A margin &theta; scales that rent down for competition among the leading labs; how large a margin survives is a judgement call you can vary." },

    { kind: "eq", eyebrow: "05 &middot; Cost",
      title: "Paying for the compute",
      eq: [ line("cost(" + V("t") + ")" + o("=") + V("S") + b("0") + dot + "10" + S(V("c") + S("L") + "(" + V("t") + ")&minus;" + V("c") + S("L") + "(0)") + dot + "10" + S("&minus;" + V("g") + b("p") + V("t"))) ],
      gloss: "The bill is the compute of the model running <b>now</b>, at prices that fall each year. Cost today is just S&#8320; &mdash; today's training spend &mdash; yet the net bill still grows &asymp; <b>2.4&times;/yr</b>: compute scales faster than prices drop.",
      params: [
        [V("g") + b("p"), "&asymp; 0.243 OOM/yr", "set so the net bill grows &times;2.4 / yr (compute prices, Cottier)"]
      ] },

    { kind: "eq", eyebrow: "06 &middot; Profit",
      title: "Does the rent beat the bill?",
      eq: [
        line(V("&Pi;") + o("=") + "revenue" + o("&minus;") + "cost"),
        '<span class="big">' + V("&nu;") + "(" + V("g") + b("c") + o("+") + V("g") + b("a") + ")"
          + o("&gt;") + V("g") + b("c") + o("&minus;") + V("g") + b("p") + "</span>"
      ],
      gloss: "With value compounding and the gap steady, the whole question collapses to a <b>race between two growth rates</b>. When that inequality holds &mdash; the value of the lead outpacing the cost of holding it &mdash; the leader turns profitable and stays there; otherwise, never. Nudge value-per-OOM past the pivot and the verdict flips." },

    { kind: "outro",
      eyebrow: "The full picture",
      title: "There's a lot more on a laptop",
      gloss: "The explorer layers more mechanisms on top of this basic model &mdash; AI-accelerated R&amp;D, the compute slowdown, value saturation, the follower's own engine &mdash; and lets you test which ones actually change the verdict.",
      foot: 'Best on a laptop &mdash; <a href="./?full=1">open the full explorer</a>.',
      credit: "Independent work in progress by Pavel Kocourek &mdash;<br>developed during the CAIS Fellowship." }
  ];

  // ---- render ----
  function slideHTML(s) {
    var h = '<article class="slide" data-kind="' + s.kind + '">';
    h += '<div class="slide-top"><div class="eyebrow">' + s.eyebrow + '</div></div>';
    h += '<div class="slide-body"><h1 class="title">' + s.title + '</h1>';
    if (s.eq)    h += '<div class="eq">' + s.eq.join("") + '</div>';
    if (s.gloss) h += '<p class="gloss">' + s.gloss + '</p>';
    if (s.list) {
      h += '<ul class="list">';
      s.list.forEach(function (it) { h += '<li><span class="k">' + it[0] + '</span><span>' + it[1] + '</span></li>'; });
      h += '</ul>';
    }
    if (s.params) {
      h += '<ul class="params">';
      s.params.forEach(function (p) {
        h += '<li><span class="row1"><span class="sym">' + p[0] + '</span><span class="val">' + p[1] + '</span></span>'
          + '<span class="note">' + p[2] + '</span></li>';
      });
      h += '</ul>';
    }
    if (s.foot)   h += '<p class="foot">' + s.foot + '</p>';
    if (s.credit) h += '<p class="credit">' + s.credit + '</p>';
    if (s.hint)   h += '<p class="swipehint"><span>Swipe to begin</span><span class="ar">&#8250;</span></p>';
    h += '</div></article>';
    return h;
  }

  var track = document.getElementById("track"), dotsEl = document.getElementById("dots");
  var bar = document.getElementById("bar"), count = document.getElementById("count");
  var prev = document.getElementById("prev"), next = document.getElementById("next");

  track.innerHTML = SLIDES.map(slideHTML).join("");
  var slides = [].slice.call(track.children), N = slides.length;

  slides.forEach(function (_, i) {
    var d = document.createElement("button");
    d.setAttribute("role", "tab"); d.setAttribute("aria-label", "Slide " + (i + 1));
    d.addEventListener("click", function () { go(i); });
    dotsEl.appendChild(d);
  });
  var dots = [].slice.call(dotsEl.children);

  var cur = -1;
  function pad(n) { return (n < 10 ? "0" : "") + n; }
  function setActive(i) {
    if (i === cur) return; cur = i;
    slides.forEach(function (s, j) { s.classList.toggle("is-active", j === i); });
    dots.forEach(function (d, j) { d.setAttribute("aria-current", j === i ? "true" : "false"); });
    bar.style.width = (i / (N - 1) * 100) + "%";
    count.textContent = pad(i + 1) + " / " + pad(N);
    prev.disabled = i === 0; next.disabled = i === N - 1;
  }
  function go(i) {
    i = Math.max(0, Math.min(N - 1, i));
    track.scrollTo({ left: i * track.clientWidth, behavior: "auto" });
    setActive(i);
  }
  var raf = 0;
  track.addEventListener("scroll", function () {
    if (raf) return;
    raf = requestAnimationFrame(function () { raf = 0; setActive(Math.round(track.scrollLeft / track.clientWidth)); });
  });
  prev.addEventListener("click", function () { go(cur - 1); });
  next.addEventListener("click", function () { go(cur + 1); });
  track.addEventListener("keydown", function (e) {
    if (e.key === "ArrowRight" || e.key === "PageDown") { e.preventDefault(); go(cur + 1); }
    if (e.key === "ArrowLeft"  || e.key === "PageUp")   { e.preventDefault(); go(cur - 1); }
    if (e.key === "Home") { e.preventDefault(); go(0); }
    if (e.key === "End")  { e.preventDefault(); go(N - 1); }
  });
  window.addEventListener("keydown", function (e) {
    if (e.target === track) return;
    if (e.key === "ArrowRight") go(cur + 1);
    if (e.key === "ArrowLeft")  go(cur - 1);
  });
  var rt = 0;
  window.addEventListener("resize", function () {
    clearTimeout(rt); rt = setTimeout(function () { track.scrollLeft = cur * track.clientWidth; }, 120);
  });

  // ---- light/dark preview toggle (defaults to the environment) ----
  var SUN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>';
  var MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>';
  var root = document.documentElement, tt = document.getElementById("tt");
  function isDark() {
    var t = root.getAttribute("data-theme");
    if (t) return t === "dark";
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  }
  function paintToggle() {
    var dark = isDark();
    document.getElementById("ttico").innerHTML = dark ? MOON : SUN;
    document.getElementById("ttlab").textContent = dark ? "Dark" : "Light";
  }
  tt.addEventListener("click", function () {
    root.setAttribute("data-theme", isDark() ? "light" : "dark");
    paintToggle();
  });
  if (window.matchMedia) {
    var mq = window.matchMedia("(prefers-color-scheme: dark)");
    (mq.addEventListener ? mq.addEventListener.bind(mq, "change") : mq.addListener.bind(mq))(paintToggle);
  }
  paintToggle();

  setActive(0);
})();
</script>
</body>
</html>
