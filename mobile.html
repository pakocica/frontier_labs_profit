<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="An interactive economic model of frontier-AI-lab competition — a phone introduction to the question and the basic model.">
<title>Will frontier AI labs be profitable?</title>
<!-- Shared tour styling (tokens + slides + navigator). Single source of truth,
     also used by the laptop intro overlay (index.html). See deploy/tour.css. -->
<link rel="stylesheet" href="./tour.css?v=1">
<style>
  /* ---- phone-page host chrome ONLY (the deck styling lives in tour.css) ----
     the stage backdrop, the phone bezel, the preview theme toggle, and the
     phone/short-viewport responsive fit. */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font: 16px/1.5 var(--sans); color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow: hidden;
  }
  button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }

  .stage {
    height: 100%; display: grid; grid-template-rows: auto 1fr; gap: 14px;
    padding: 14px; place-items: center; background: var(--stage);
  }

  /* -------- prototype-only top chrome: a label + a light/dark preview toggle -- */
  .chrome {
    display: flex; align-items: center; gap: 12px; font-size: 12.5px; color: var(--muted);
  }
  .chrome .lbl { letter-spacing: .16em; text-transform: uppercase; font-size: 10.5px; color: var(--faint); font-family: var(--mono); }
  .chrome .hint { font-size: 11px; color: var(--faint); }
  .tt {
    display: inline-flex; align-items: center; gap: 7px; padding: 6px 13px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--line); color: var(--ink);
    font-size: 12px; font-weight: 600;
  }
  .tt svg { width: 15px; height: 15px; }

  /* ------------------------------------------------------------- the phone -- */
  .phone {
    position: relative; width: 392px; height: min(818px, calc(100vh - 88px));
    border-radius: 44px; overflow: hidden; background: var(--bg);
    box-shadow: 0 0 0 10px var(--bezel-b), 0 0 0 12px var(--bezel-a), 0 30px 70px -20px var(--frame);
  }

  /* ---------------------------------------------------------- responsive -- */
  @media (max-width: 460px), (max-height: 720px) {
    .stage { padding: 0; gap: 0; grid-template-rows: 1fr; background: var(--bg); }
    .chrome {
      position: fixed; top: calc(8px + env(safe-area-inset-top, 0px)); left: 50%; transform: translateX(-50%);
      z-index: 40; background: color-mix(in srgb, var(--bg) 74%, transparent);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 5px 7px; border-radius: 999px; border: 1px solid var(--line);
    }
    .chrome .lbl, .chrome .hint { display: none; }
    .phone { width: 100vw; height: 100dvh; border-radius: 0; box-shadow: none; }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="chrome">
    <button class="tt" id="tt" aria-label="Toggle light or dark"><span id="ttico"></span><span id="ttlab">Theme</span></button>
  </div>

  <!-- the deck (track + navigator) is built into this host by FLPTour.mountDeck -->
  <div class="phone" id="phone"></div>
</div>

<script src="./tour.js?v=1"></script>
<script>
(function () {
  "use strict";

  // ---- mount the shared deck into the phone frame (env: phone) ----
  var deck = window.FLPTour.mountDeck(document.getElementById("phone"), { env: "phone" });

  // arrow keys anywhere on the page (not just the focused track) advance the deck
  window.addEventListener("keydown", function (e) {
    var track = document.querySelector("#phone .track");
    if (e.target === track) return;   // the deck handles its own focused keys
    if (e.key === "ArrowRight") deck.go(deck.current() + 1);
    if (e.key === "ArrowLeft")  deck.go(deck.current() - 1);
  });

  // ---- light/dark preview toggle (defaults to the environment) ----
  var SUN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>';
  var MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>';
  var root = document.documentElement, tt = document.getElementById("tt");
  function isDark() {
    var t = root.getAttribute("data-theme");
    if (t) return t === "dark";
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  }
  function paintToggle() {
    var dark = isDark();
    document.getElementById("ttico").innerHTML = dark ? MOON : SUN;
    document.getElementById("ttlab").textContent = dark ? "Dark" : "Light";
  }
  tt.addEventListener("click", function () {
    root.setAttribute("data-theme", isDark() ? "light" : "dark");
    paintToggle();
  });
  if (window.matchMedia) {
    var mq = window.matchMedia("(prefers-color-scheme: dark)");
    (mq.addEventListener ? mq.addEventListener.bind(mq, "change") : mq.addListener.bind(mq))(paintToggle);
  }
  paintToggle();
})();
</script>
</body>
</html>
