<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    /* (D-057) Phone routing — AUTHORIZED by Pavel ("This looks excellent. Please deploy it.",
       2026-07-23, and again when he reported the redirect was missing on his phone). Send
       small-screen touch visitors to the static introduction (mobile.html) BEFORE the ~30-60s
       Pyodide download begins — the full explorer is built for a laptop. The intro's "open the
       full explorer" link returns here with ?full=1, remembered for the session so it doesn't
       bounce back. A coarse (touch) pointer is required, so a desktop browser in a short/narrow
       window keeps the full app. Runs first in <head>, before any heavy asset loads. */
    (function () {
      try {
        var qp = new URLSearchParams(location.search);
        if (qp.get("full") === "1") { try { sessionStorage.setItem("flp_full", "1"); } catch (e) {} }
        var full = qp.get("full") === "1" ||
          (function () { try { return sessionStorage.getItem("flp_full") === "1"; } catch (e) { return false; } })();
        var coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
        var minInner = Math.min(window.innerWidth || 9999, window.innerHeight || 9999);
        var minScreen = (window.screen && screen.width && screen.height)
          ? Math.min(screen.width, screen.height) : 9999;
        var small = Math.min(minInner, minScreen) < 640;
        if (coarse && small && !full) { location.replace("./mobile.html"); }
      } catch (e) {}
    })();
  </script>
  <title>Frontier-AI-lab competition — interactive explorer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.css" />
  <link rel="stylesheet" href="./intro.css?v=3" />
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; }
    /* critical inline fallback: the boot cover must paint IMMEDIATELY, even if intro.css
       is still in flight (phone first loads saw a blank page otherwise) */
    #intro { position: fixed; inset: 0; z-index: 1000000; background: #0e1117; color: #e6e6df;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      overflow-y: auto; padding: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    @media (prefers-color-scheme: light) { #intro { background: #ffffff; color: #31333f; } }
  </style>
</head>
<body>
  <!-- Boot overlay: instant minimal cover; intro.js expands it into the loading intro
       (guess hook + optional model primer) unless the app is ready within a grace
       window (cached visits). intro.{js,css} live at the repo root, OUTSIDE the
       src/ tree that deploy/sync.sh rewrites. -->
  <div id="intro">
    <div class="i-min">
      <div class="i-spin"></div>
      <div>Loading the explorer…</div>
      <small>Runs entirely in your browser (Python via WebAssembly) — nothing is sent
        to a server. First load takes ~30&#8211;60 seconds.</small>
    </div>
  </div>
  <div id="root"></div>
  <script src="./intro.js?v=3" defer></script>
  <script type="module">
    import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.js";
    import { APP_FILES } from "./app_files.js";

    // Mount every synced source file at its widget-relative path (src/ stripped).
    const files = {};
    for (const p of APP_FILES) {
      files[p.replace(/^src\//, "")] = { url: "./" + p };
    }

    mount(
      {
        entrypoint: "app.py",
        requirements: ["numpy", "plotly"],
        files,
        // The intro overlay renders its own staged progress; stlite's toasts would
        // just flash underneath it.
        disableProgressToasts: true,
        streamlitConfig: {
          "theme.light.primaryColor": "#4c8dff",
          "theme.dark.primaryColor": "#4c8dff",
          "client.toolbarMode": "viewer",
        },
      },
      document.getElementById("root"),
    );
    // The overlay's removal (on Streamlit's first real paint) is handled by intro.js.
  </script>
</body>
</html>
